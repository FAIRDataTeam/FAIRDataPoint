name: Publish to Docker Hub

on:
  push:
    branches:
      - master
  pull_request:
    paths-ignore:
      - "**.cff"
      - "**.md"
      - "LICENSE"
  release:
    types:
      - created

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: FAIRDataTeam/github-workflows/.github/workflows/maven-verify.yml@v3
    with:
      # todo: enable tests (and specify db properties) when test duration has been minimized
      mvn-options: "-DskipTests"
      db-type: "none"
      db-version: 0
  publish:
    needs: verify
    uses: FAIRDataTeam/github-workflows/.github/workflows/docker-publish.yml@v3
    secrets: inherit
    with:
      file: './Dockerfile'
      push: ${{ github.event_name == 'push' || github.event_name == 'release' }}
      build-args: |
        "PROJECT_VERSION=${{ github.ref_name }}"
  e2e:
    # The end-to-end tests get the docker image from docker hub, so the image needs to be published first.
    # This makes most sense for pushes to the master branch, before the actual release takes place.
    # Nevertheless, it does provide extra verification for the release case as well.
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: determine docker image version from ref_name
        # We need to remove the leading "v" from version strings like "v1.2.3", but not from tags like "very-nice".
        # Unfortunately, we cannot do this inline but need a separate step that stores the result in outputs.
        # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-commands#setting-an-output-parameter
        id: image-version
        run: |
          version="${{ github.ref_name }}"
          [[ "$version" == v[0-9]* ]] && version="${version#v}"
          echo "IMAGE_VERSION=$version" >> "$GITHUB_OUTPUT"
      - name: trigger e2e tests
        uses: FAIRDataTeam/github-workflows/.github/actions/repo-dispatch@v3
        with:
          secret-token: ${{ secrets.FDP_E2E_REPO_DISPATCH_TOKEN }}
          target-repo-name: FAIRDataPoint-E2E-Tests
          target-repo-owner: FAIRDataTeam
          event-type: trigger-tests
          client-payload: |
            {
                "fdp_version": "${{ steps.image-version.outputs.IMAGE_VERSION }}",
                "fdp_client_version": "latest"
            }
