# https://docs.github.com/en/actions/use-cases-and-examples/building-and-testing/building-and-testing-java-with-maven

name: Maven verify

on:
  - push
  - pull_request
  - workflow_dispatch

jobs:
  test:
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - windows-2022
          - macos-14
        java-version:
          - 21
    # todo: specify version instead of temporary branch
    uses: FAIRDataTeam/github-workflows/.github/workflows/maven-verify.yml@issue7-db
    with:
      runner: ${{ matrix.runner }}
      java-version: ${{ matrix.java-version }}
      mvn-options: '-Dspring.profiles.active=testing'
      # db settings must match testing profile
      db-type: postgresql
      db-name: fdp_test
      db-username: fdp
      db-password: fdp
      db-port: 54321
