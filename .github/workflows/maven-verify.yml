# https://docs.github.com/en/actions/use-cases-and-examples/building-and-testing/building-and-testing-java-with-maven

name: Maven verify

on:
  push:
    branches:
      - master
      - "support/**"
  pull_request:
    paths-ignore:
      - "**.cff"
      - "**.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        runner:
          # https://github.com/ankane/setup-mongodb?tab=readme-ov-file#versions
          - os: ubuntu-24.04
            mongo: 8
          - os: windows-2025
            mongo: 7
          - os: macos-14
            mongo: 8
        java-version:
          - 21
    uses: FAIRDataTeam/github-workflows/.github/workflows/maven-verify.yml@v3
    with:
      runner: ${{ matrix.runner.os }}
      java-version: ${{ matrix.java-version }}
      # quotes around spring.profiles.active are required for windows
      mvn-options: '-D"spring.profiles.active"=testing'
      # db settings must match testing profile
      db-type: mongodb
      db-version: ${{ matrix.runner.mongo }}  # see https://github.com/ankane/setup-mongodb/issues/6
